<div class="page-wrap">
  <header class="page-head">
    <div>
      <h1>Asignar Roles</h1>
      <p>Asigna roles a un usuario por instancia.</p>
    </div>
  </header>

  <section class="card">
    <div class="form-grid">

      <div class="form-group">
        <label>Usuario</label>
        <select [(ngModel)]="userId" (change)="onSelectionChange()">
          <option [ngValue]="null">-- Selecciona --</option>
          <option *ngFor="let u of users" [ngValue]="u.id">
            {{ u.user }} - {{ u.names }} {{ u.surnames }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Instancia</label>
        <select [(ngModel)]="instanceId" (change)="onSelectionChange()">
          <option [ngValue]="null">-- Selecciona --</option>
          <option *ngFor="let i of instances" [ngValue]="i.id">
            {{ i.name }}
          </option>
        </select>
      </div>

      <div class="actions">
        <button class="btn-secondary"
                (click)="loadUserRoles()"
                [disabled]="loading || !canLoad()">
          {{ loading ? 'Cargando...' : 'Cargar roles' }}
        </button>

        <button class="btn-primary"
                (click)="save()"
                [disabled]="saving || loading || !canLoad()">
          {{ saving ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>

    </div>

    <p class="error" *ngIf="error">{{ error }}</p>
    <p class="info" *ngIf="info">{{ info }}</p>
  </section>

  <section class="card">
    <div class="card-head">
      <h2>Roles disponibles</h2>
      <span class="muted">Marca los roles que tendrá el usuario en la instancia</span>
    </div>

    <!-- Mensaje cuando no hay selección -->
    <div class="empty" *ngIf="!canLoad()">
      📌 Selecciona un usuario y una instancia para ver/asignar roles.
    </div>

    <!-- Lista de roles -->
    <div class="roles-grid" *ngIf="canLoad()">
      <label class="role-item" *ngFor="let r of roles">
        <input
          type="checkbox"
          [checked]="isChecked(r.id!)"
          (change)="toggle(r.id!)"
          [disabled]="loading || saving"
        />
        <div>
          <div class="role-title">{{ r.name }}</div>
          <div class="role-desc">{{ r.description || '—' }}</div>
        </div>
      </label>
    </div>
  </section>
</div>
