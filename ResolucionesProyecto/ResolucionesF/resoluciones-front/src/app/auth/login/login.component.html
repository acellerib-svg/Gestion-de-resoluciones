<main class="login-container">
  <section class="login-card">

    <header class="login-header">
      <div class="logo">
        <img src="/uteqLogo.png" alt="LogoUteq">
      </div>
      <h1>Iniciar sesión</h1>
      <p>Sistema de Resoluciones</p>
    </header>

    <form class="login-form" (ngSubmit)="login()" #f="ngForm">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          id="username"
          name="username"
          type="text"
          placeholder="Ingrese su usuario"
          [(ngModel)]="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-password-wrapper">
          <input
            id="password"
            name="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Ingrese su contraseña"
            [(ngModel)]="password"
            required
          />
          <button type="button" class="toggle-password" (click)="togglePassword()">
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <path d="M1 1l22 22"/>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="loading || f.invalid">
          {{ loading ? 'Ingresando...' : 'Entrar' }}
        </button>
      </div>

      <p class="form-error" *ngIf="error">{{ error }}</p>
    </form>

    <div class="register-link">
      <a routerLink="/registro">Pide tus credenciales aqu&iacute;</a>
    </div>

    <footer class="login-footer">
      <small>&copy; 2026 - Sistema de Resoluciones</small>
    </footer>

  </section>
</main>
